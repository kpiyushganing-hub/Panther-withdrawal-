<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Panel</title>
    <style>
        body { background-color: #0a0e14; color: #e6edf3; font-family: sans-serif; padding: 30px; }
        .form-group { margin-bottom: 15px; max-width: 500px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #161b22; border: 1px solid #30363d; color: white; border-radius: 6px; }
        button { background: #1f6feb; border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Admin Control Dashboard</h1>
    
    <div class="form-group">
        <label>Telegram Bot API Token / Key</label>
        <input type="text" id="botToken" placeholder="BotFather Token Paste Karein">
    </div>

    <div class="form-group">
        <label>Gateway Payment API Link</label>
        <input type="text" id="apiLink" placeholder="https://yourgateway.com">
    </div>

    <button onclick="saveAdminSettings()">Settings Update Karein</button>

    <script>
        async function saveAdminSettings() {
            const botToken = document.getElementById('botToken').value;
            const apiLink = document.getElementById('apiLink').value;

            const response = await fetch('/api/admin/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ botToken, apiLink })
            });
            const result = await response.json();
            if(result.success) alert("Configurations successfully synchronized!");
        }
    </script>
</body>
</html>
